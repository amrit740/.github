name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate smooth snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: amrittiwari
          outputs: |
            dist/snake-soft.svg?color_snake=#6ee7b7&color_dots=#ebedf0,#c7f9cc,#80ed99,#57cc99,#38a3a5
            dist/snake-night.svg?palette=github-dark&color_snake=#a78bfa

      - name: Deploy snake animation
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
